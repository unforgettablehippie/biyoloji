<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biyoçeşitlilik Sergisi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --ink:    #1a1a18;
  --cream:  #f5f0e8;
  --sage:   #4a6741;
  --moss:   #2d4228;
  --clay:   #b87651;
  --gold:   #c8a96a;
  --mist:   #e8e2d6;
  --card-r: 6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── INTRO ─────────────────────────────── */
.intro {
  position: fixed;
  inset: 0;
  background: var(--moss);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1000;
  transition: opacity 0.9s ease, visibility 0.9s;
}

.intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.intro-deco {
  width: 90px;
  height: 90px;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.8s 0.3s forwards;
}

.intro h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(1.8rem, 5vw, 3rem);
  color: var(--cream);
  text-align: center;
  letter-spacing: 0.04em;
  opacity: 0;
  animation: fadeUp 0.8s 0.6s forwards;
  line-height: 1.3;
}

.intro p {
  font-size: 0.78rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: 36px;
  opacity: 0;
  animation: fadeUp 0.8s 1s forwards;
}

/* Organik SVG süsleme */
.intro-ring {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  border: 1px solid rgba(200,169,106,0.18);
  animation: spin 40s linear infinite;
}
.intro-ring2 {
  width: 340px; height: 340px;
  border-color: rgba(200,169,106,0.10);
  animation: spin 28s linear infinite reverse;
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── NAV ─────────────────────────────── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--cream);
  border-bottom: 1px solid var(--mist);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 60px;
  backdrop-filter: blur(8px);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-brand svg { color: var(--sage); }

.nav-brand span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--moss);
}

.nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--mist);
  padding: 4px;
  border-radius: 999px;
}

.nav-tab {
  padding: 7px 20px;
  border: none;
  background: transparent;
  border-radius: 999px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #888;
  transition: all 0.25s;
}

.nav-tab.active {
  background: var(--moss);
  color: var(--cream);
  box-shadow: 0 2px 8px rgba(45,66,40,0.25);
}

/* ─── HEADER ─────────────────────────── */
.sergi-header {
  padding: 56px 28px 20px;
  max-width: 1100px;
  margin: 0 auto;
}

.sergi-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(2rem, 5vw, 3.4rem);
  color: var(--moss);
  line-height: 1.15;
  margin-bottom: 6px;
}

.sergi-header h2 em {
  font-style: italic;
  color: var(--clay);
}

.sergi-header p {
  font-size: 0.88rem;
  color: #888;
  letter-spacing: 0.04em;
}

/* ─── FİLTRE ─────────────────────────── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 28px 24px;
  max-width: 1100px;
  margin: 0 auto;
}

.filter-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #aaa;
  margin-right: 4px;
}

.filter-btn {
  padding: 6px 18px;
  border-radius: 999px;
  border: 1.5px solid var(--mist);
  background: transparent;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  color: #888;
  transition: all 0.2s;
}

.filter-btn:hover { border-color: var(--sage); color: var(--sage); }

.filter-btn.active {
  background: var(--sage);
  border-color: var(--sage);
  color: #fff;
}

/* ─── GRID ────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 18px;
  padding: 0 28px 60px;
  max-width: 1100px;
  margin: 0 auto;
}

/* ─── FLIP KART ──────────────────────── */
.flip-card {
  height: 300px;
  perspective: 1200px;
  cursor: pointer;
}

.flip-inner {
  width: 100%;
  height: 100%;
  transition: transform 0.7s cubic-bezier(.4,0,.2,1);
  transform-style: preserve-3d;
  position: relative;
}

.flip-card.flipped .flip-inner {
  transform: rotateY(180deg);
}

.flip-front, .flip-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: var(--card-r);
  overflow: hidden;
  border: 1px solid var(--mist);
}

.flip-front { background: #ccc; }

.flip-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
}

.flip-card:hover .flip-front img { transform: scale(1.04); }

/* Ön kart — tür etiketi */
.card-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 4px 10px;
  border-radius: 999px;
  font-weight: 500;
}

.hayvan .card-badge { background: rgba(184,118,81,0.9); color: #fff; }
.bitki  .card-badge { background: rgba(74,103,65,0.9);  color: #fff; }

/* Ön kart — isim overlay */
.card-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 40px 14px 14px;
  background: linear-gradient(transparent, rgba(26,26,24,0.72));
  color: #fff;
}

.card-overlay .name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 400;
  line-height: 1.2;
}

/* Arka yüz */
.flip-back {
  transform: rotateY(180deg);
  background: var(--moss);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  padding: 24px 20px;
  gap: 12px;
}

.flip-back .back-icon {
  width: 36px; height: 36px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
  font-size: 1rem;
}

.flip-back .back-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  font-weight: 400;
  color: var(--cream);
  line-height: 1.2;
}

.flip-back .back-latin {
  font-size: 0.82rem;
  font-style: italic;
  color: var(--gold);
  opacity: 0.9;
}

.flip-back .back-divider {
  width: 32px;
  height: 1px;
  background: rgba(200,169,106,0.4);
}

.flip-back .back-hint {
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.4);
}

/* Kart giriş animasyonu */
.flip-card {
  opacity: 0;
  animation: cardIn 0.5s forwards;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── AĞAÇ ────────────────────────────── */
#tree {
  display: none;
  max-width: 700px;
  margin: 0 auto;
  padding: 48px 28px 80px;
}

#tree h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 2.4rem;
  color: var(--moss);
  margin-bottom: 8px;
}

#tree .tree-sub {
  font-size: 0.85rem;
  color: #aaa;
  margin-bottom: 36px;
  letter-spacing: 0.04em;
}

.tree-root { list-style: none; padding: 0; }

.tree-node { list-style: none; }

.tree-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  border-left: 2px solid transparent;
  user-select: none;
  margin-bottom: 2px;
}

.tree-item:hover { background: var(--mist); }

.tree-item.open-item {
  border-left-color: var(--sage);
  background: rgba(74,103,65,0.06);
}

.tree-item .ti-icon {
  font-size: 1rem;
  width: 22px;
  text-align: center;
  transition: transform 0.2s;
  color: var(--sage);
}

.tree-item.open-item .ti-icon { transform: rotate(90deg); }

.tree-item .ti-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--moss);
}

.tree-item .ti-leaf-label {
  font-size: 0.9rem;
  color: var(--ink);
  font-weight: 400;
}

.tree-item .ti-latin {
  margin-left: auto;
  font-size: 0.75rem;
  font-style: italic;
  color: #aaa;
}

.tree-children {
  padding-left: 28px;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s ease;
}

.tree-children.open { max-height: 600px; }

.tree-children .tree-item {
  border-left-color: transparent;
  background: transparent;
}

.tree-children .tree-item:hover { background: var(--mist); }

/* ─── FOOTER ─────────────────────────── */
footer {
  text-align: center;
  padding: 24px;
  font-size: 0.74rem;
  color: #bbb;
  letter-spacing: 0.08em;
  border-top: 1px solid var(--mist);
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro" onclick="closeIntro()">
  <div class="intro-ring"></div>
  <div class="intro-ring intro-ring2"></div>

  <svg class="intro-deco" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="45" cy="45" r="44" stroke="rgba(200,169,106,0.3)" stroke-width="1"/>
    <path d="M45 10 C45 10 30 30 45 50 C60 30 45 10 45 10Z" fill="rgba(200,169,106,0.5)"/>
    <path d="M20 45 C20 45 38 35 50 50 C35 62 20 45 20 45Z" fill="rgba(74,103,65,0.5)"/>
    <path d="M70 45 C70 45 52 35 40 50 C55 62 70 45 70 45Z" fill="rgba(74,103,65,0.4)"/>
    <circle cx="45" cy="52" r="5" fill="rgba(200,169,106,0.6)"/>
  </svg>

  <h1>Hoş geldiniz,<br>Özden Keser</h1>
  <p>Sergiye girmek için tıklayın</p>
</div>

<!-- NAV -->
<nav>
  <div class="nav-brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M12 2C6 2 2 9 2 12s4 10 10 10 10-4 10-10S18 2 12 2z"/>
      <path d="M12 2c0 0-4 5-4 10s4 10 4 10"/>
      <path d="M2 12h20"/>
    </svg>
    <span>Biyoçeşitlilik Sergisi</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('sergi', this)">Sergi</button>
    <button class="nav-tab" onclick="switchTab('agac', this)">Yaşam Ağacı</button>
  </div>
</nav>

<!-- SERGİ -->
<div id="sergi-view">
  <div class="sergi-header">
    <h2>Anadolu'muzun Biyoçeşitliliği</h2>
    <p>Endemik Türlerimiz</p>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filtrele</span>
    <button class="filter-btn active" onclick="filter('hepsi', this)">Tümü</button>
    <button class="filter-btn" onclick="filter('hayvan', this)">Hayvanlar</button>
    <button class="filter-btn" onclick="filter('bitki', this)">Bitkiler</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- AĞAÇ -->
<div id="tree">
  <h2>Yaşam Ağacı</h2>
  <p class="tree-sub">Taksonomik sınıflandırmayı keşfedin</p>
  <ul class="tree-root" id="treeRoot"></ul>
</div>

<footer>Biyoçeşitlilik Sergisi &nbsp;·&nbsp; Anadolu Endemik Türleri</footer>

<script>
/* ── VERİ ── */
const canlılar = [
  { ad:"İnci Kefali",               latin:"Alburnus tarichi",                tür:"hayvan", görsel:"images/a1.jpg", icon:"🐟" },
  { ad:"Antalya Kara Semenderi",     latin:"Lyciasalamandra antalyana",       tür:"hayvan", görsel:"images/a2.jpg", icon:"🦎" },
  { ad:"Anadolu Semenderi",          latin:"Triturus anatolicus",             tür:"hayvan", görsel:"images/a3.jpg", icon:"🦎" },
  { ad:"Anadolu Kaya Kertenkelesi",  latin:"Anatololacerta anatolica",        tür:"hayvan", görsel:"images/a4.jpg", icon:"🦎" },
  { ad:"Kayseri Kertenkelesi",       latin:"Apathya cappadocica",             tür:"hayvan", görsel:"images/a5.jpg", icon:"🦎" },
  { ad:"Kazdağı Göknarı",            latin:"Abies nordmanniana",              tür:"bitki",  görsel:"images/p1.jpg", icon:"🌲" },
  { ad:"Ankara Çiğdemi",             latin:"Crocus ancyrensis",               tür:"bitki",  görsel:"images/p2.jpg", icon:"🌸" },
  { ad:"Çuh Lalesi",                 latin:"Tulipa koyuncui",                 tür:"bitki",  görsel:"images/p3.jpg", icon:"🌷" },
  { ad:"Altınlale",                  latin:"Tulipa armena var. galatica",     tür:"bitki",  görsel:"images/p4.jpg", icon:"🌷" },
];

/* ── GRID ── */
const grid = document.getElementById("grid");

function render(data) {
  grid.innerHTML = "";
  data.forEach((c, i) => {
    const el = document.createElement("div");
    el.className = `flip-card ${c.tür}`;
    el.style.animationDelay = `${i * 0.06}s`;

    el.innerHTML = `
      <div class="flip-inner">
        <div class="flip-front">
          <img src="${c.görsel}" alt="${c.ad}" loading="lazy">
          <span class="card-badge">${c.tür === 'hayvan' ? 'Hayvan' : 'Bitki'}</span>
          <div class="card-overlay">
            <div class="name">${c.ad}</div>
          </div>
        </div>
        <div class="flip-back">
          <div class="back-icon">${c.icon}</div>
          <div class="back-name">${c.ad}</div>
          <div class="back-divider"></div>
          <div class="back-latin">${c.latin}</div>
          <div class="back-hint">Latince ad</div>
        </div>
      </div>`;

    el.addEventListener("click", () => el.classList.toggle("flipped"));
    grid.appendChild(el);
  });
}

render(canlılar);

/* ── FİLTRE ── */
function filter(tür, btn) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const filtered = tür === "hepsi" ? canlılar : canlılar.filter(c => c.tür === tür);
  render(filtered);
}

/* ── SEKMELER ── */
function switchTab(tab, btn) {
  document.querySelectorAll(".nav-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  document.getElementById("sergi-view").style.display = tab === "sergi" ? "block" : "none";
  document.getElementById("tree").style.display = tab === "agac" ? "block" : "none";
}

/* ── INTRO ── */
function closeIntro() {
  document.getElementById("intro").classList.add("hidden");
}

/* ── AĞAÇ ── */
const treeData = {
  label: "Yaşam",
  children: [
    {
      label: "Hayvanlar",
      children: canlılar.filter(c => c.tür === "hayvan").map(c => ({ label: c.ad, latin: c.latin }))
    },
    {
      label: "Bitkiler",
      children: canlılar.filter(c => c.tür === "bitki").map(c => ({ label: c.ad, latin: c.latin }))
    }
  ]
};

function buildTree(nodes) {
  const ul = document.createElement("ul");
  ul.className = "tree-root";

  nodes.forEach(node => {
    const li = document.createElement("li");
    li.className = "tree-node";

    const item = document.createElement("div");
    item.className = "tree-item";

    if (node.children) {
      item.innerHTML = `
        <span class="ti-icon">›</span>
        <span class="ti-label">${node.label}</span>`;

      const children = buildTree(node.children);
      children.classList.add("tree-children");

      item.addEventListener("click", () => {
        item.classList.toggle("open-item");
        children.classList.toggle("open");
      });

      li.appendChild(item);
      li.appendChild(children);
    } else {
      item.innerHTML = `
        <span class="ti-icon" style="color:var(--gold);font-size:.55rem">●</span>
        <span class="ti-leaf-label">${node.label}</span>
        <span class="ti-latin">${node.latin || ""}</span>`;
      li.appendChild(item);
    }

    ul.appendChild(li);
  });

  return ul;
}

const treeEl = buildTree(treeData.children);
document.getElementById("treeRoot").appendChild(treeEl);
</script>

</body>
</html>
